{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>修改成功 - 随心贴</title>
    <style>
        body {
            background-image: url("{% static 'blog/images/background.jpg' %}");
            background-size: cover;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 8px;
            text-align: center;
        }
        .success-icon {
            font-size: 60px;
            color: #00c851;
            margin: 20px 0;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin: 10px;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>用户名修改成功！</h1>
        <p>你的新用户名已生效，点击下方按钮返回个人主页或首页</p>
        <a href="{% url 'blog:profile' %}" class="btn">返回个人主页</a>
        <a href="{% url 'blog:index' %}" class="btn">返回首页</a>
    </div>
</body>
</html>
