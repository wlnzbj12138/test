{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>发表文章 - 随心贴</title>
    <style>
        body {
            background-image: url("{% static 'blog/images/background.jpg' %}");
            background-size: cover;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 8px;
        }
        .nav {
            margin-bottom: 20px;
        }
        .nav a {
            margin-right: 15px;
            color: #333;
            text-decoration: none;
        }
        .form-group {
            margin: 15px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        textarea {
            resize: vertical;
        }
        .image-upload {
            padding: 10px;
            border: 1px dashed #ddd;
            border-radius: 4px;
            margin: 10px 0;
        }
        .error {
            color: red;
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="{% url 'blog:index' %}">返回首页</a>
        </div>
        <h1>发表文章</h1>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <!-- 关键：enctype="multipart/form-data" 必须加，支持文件上传 -->
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- 文章标题和内容 -->
            <div class="form-group">
                {{ article_form.title.label_tag }}
                {{ article_form.title }}
            </div>
            <div class="form-group">
                {{ article_form.content.label_tag }}
                {{ article_form.content }}
            </div>

            <!-- 原生多文件上传控件（兼容所有Django版本） -->
           <!-- 替换为4个单文件选择框（逐张选，不替换） -->
<div class="form-group">
    <label>上传图片（最多4张，逐张选择，选过的不会被替换）</label>
    <div class="image-upload">
        <input type="file" name="images" accept="image/jpeg,image/png,image/gif"> 第1张<br>
        <input type="file" name="images" accept="image/jpeg,image/png,image/gif"> 第2张<br>
        <input type="file" name="images" accept="image/jpeg,image/png,image/gif"> 第3张<br>
        <input type="file" name="images" accept="image/jpeg,image/png,image/gif"> 第4张<br>
        <p style="margin-top: 8px; color: #666; font-weight: 500;">
            ✅ 支持格式：jpg/png/gif | 单张不超过5MB | 可选1-4张，空着也可以
        </p>
    </div>
</div>

            <button type="submit">发布文章</button>
        </form>
    </div>
</body>
</html>
