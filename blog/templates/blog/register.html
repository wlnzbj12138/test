<!DOCTYPE html>
<html>
<head>
    <title>注册</title>
    <style>
        body { background-image: url("{% static 'blog/images/background.jpg' %}"); background-size: cover; }
        .container { max-width: 400px; margin: 100px auto; background: white; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>注册</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">注册</button>
        </form>
        <p>已有账号？<a href="{% url 'blog:login' %}">去登录</a></p>
    </div>
</body>
</html>
